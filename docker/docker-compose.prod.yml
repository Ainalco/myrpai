services:
  caddy:
    image: caddy:2-alpine
    container_name: aibot_caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
    depends_on:
      - frontend
    networks:
      - aibot_network
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg15
    container_name: aibot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aibot}
      POSTGRES_USER: ${POSTGRES_USER:-aibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aibot_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aibot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aibot_redis
    volumes:
      - redis_data:/data
    networks:
      - aibot_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aibot_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aibot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aibot}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FIREFLIES_API_URL: ${FIREFLIES_API_URL:-https://api.fireflies.ai/graphql}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-production}
      DOMAIN_NAME: ${DOMAIN_NAME}
      USE_SSL: ${USE_SSL:-true}
      # Scurry email service URLs (local Docker service)
      GMAIL_API_BASE_URL: http://scurry-email
      GMAIL_AUTH_URL: http://backend:9000/api
      OUTLOOK_API_BASE_URL: http://scurry-email/outlook
      OUTLOOK_AUTH_URL: http://backend:9000/api
      # Paddle billing
      PADDLE_API_KEY: ${PADDLE_API_KEY:-}
      PADDLE_ENVIRONMENT: ${PADDLE_ENVIRONMENT:-sandbox}
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET:-}
      PADDLE_CLIENT_TOKEN: ${PADDLE_CLIENT_TOKEN:-}
      PADDLE_PRICE_OAK_MONTHLY: ${PADDLE_PRICE_OAK_MONTHLY:-}
      PADDLE_PRICE_OAK_ANNUAL: ${PADDLE_PRICE_OAK_ANNUAL:-}
      PADDLE_PRICE_REDWOOD_MONTHLY: ${PADDLE_PRICE_REDWOOD_MONTHLY:-}
      PADDLE_PRICE_REDWOOD_ANNUAL: ${PADDLE_PRICE_REDWOOD_ANNUAL:-}
      PADDLE_PRICE_ACORNS_500: ${PADDLE_PRICE_ACORNS_500:-}
      PADDLE_PRICE_ACORNS_1750: ${PADDLE_PRICE_ACORNS_1750:-}
      PADDLE_PRICE_ACORNS_4000: ${PADDLE_PRICE_ACORNS_4000:-}
      # Resend (transactional email fallback)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@scurry.so}
      # Cloudflare R2 storage
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
    # No external port exposure - only accessible through Caddy
    expose:
      - "9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scurry-email:
        condition: service_healthy
    networks:
      - aibot_network
    restart: unless-stopped
    command: sh -c "python migrate.py && uvicorn main:socket_app --host 0.0.0.0 --port 9000"

  pipedrive-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aibot_pipedrive_worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aibot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aibot}
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PIPEDRIVE_SYNC_INTERVAL: ${PIPEDRIVE_SYNC_INTERVAL:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aibot_network
    restart: unless-stopped
    command: python pipedrive_worker.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-90000}
    container_name: aibot_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-90000}
    # No external port - only accessible through Caddy
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - aibot_network
    restart: unless-stopped

  scurry-email:
    build: ./services/scurry-email
    container_name: aibot_scurry_email
    environment:
      # Database (shared PostgreSQL)
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-aibot}
      DB_USER: ${POSTGRES_USER:-aibot}
      DB_PASS: ${POSTGRES_PASSWORD}
      # JWT Auth (validates against backend)
      AUTH_API_URL: http://backend:9000/auth/me
      JWT_VERIFY_METHOD: api
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      # Microsoft OAuth
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
      MICROSOFT_TENANT: ${MICROSOFT_TENANT:-common}
      # App URLs (must be public-facing for tracking pixels and OAuth callbacks)
      SCURRY_APP_URL: ${SCURRY_APP_URL}
      SCURRY_OUTLOOK_APP_URL: ${SCURRY_OUTLOOK_APP_URL}
      # Encryption
      SCURRY_ENCRYPTION_KEY: ${SCURRY_ENCRYPTION_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    # No external port - only accessible through frontend proxy
    expose:
      - "80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aibot_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/test.php"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  aibot_network:
    driver: bridge
