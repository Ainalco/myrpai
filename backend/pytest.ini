[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts =
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --strict-markers
    --tb=short
    -v

# Ignore paths
norecursedirs = .git .venv venv __pycache__ *.egg-info .pytest_cache alembic migrations

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    skip_ci: Skip in CI pipeline

# Async settings
asyncio_mode = auto

# Environment variables for testing
env =
    TESTING=true
    DATABASE_URL=sqlite:///:memory:
    REDIS_URL=redis://localhost:6379/1
    SECRET_KEY=test-secret-key-for-testing-only
    ENCRYPTION_KEY=test-encryption-key-32-chars-minimum
    ALGORITHM=HS256
